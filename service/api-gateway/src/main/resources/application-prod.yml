spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: portal
              uri: ${PORTAL_URI:http://portal:8080}
              predicates:
                - Path=/portal/**
              filters:
                - StripPrefix=1

            - id: survey
              uri: ${SURVEY_URI:http://survey-service:8081}
              predicates:
                - Path=/survey/**
              filters:
                - StripPrefix=1

            - id: advisor
              uri: ${ADVISOR_URI:http://stock-advisor:8082}
              predicates:
                - Path=/advisor/**
              filters:
                - StripPrefix=1

            - id: market
              uri: ${MARKET_URI:http://market-analyzer:8083}
              predicates:
                - Path=/market/**
              filters:
                - StripPrefix=1

# JWT 시크렇은 반드시 환경 변수로 주입 (docker-compose 또는 k8s secret)
# JWT_SECRET 환경 변수 필수
