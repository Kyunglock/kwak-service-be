spring:
  profiles:
    active: local
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://192.168.0.8:5173"
                  - "http://kyungroak.iptime.org"
                  - "https://kyungroak.iptime.org"
                  - "https://kwaklabs.com"
                  - "https://www.kwaklabs.com"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
            - RemoveRequestHeader=Origin
          # SP1 병합: survey/market/advisor 가 core(portal)로 합쳐져 모든 라우트가 core를 가리킨다.
          # 접두어(/portal /survey /advisor /market)는 운영 프론트 호환 위해 유지, StripPrefix 후 /api/v1/** 가 core로 전달됨.
          # (SP2에서 /ai/** → ${AI_URI} 라우트 추가 예정)
          routes:
            - id: portal
              uri: ${CORE_URI:http://localhost:8080}
              predicates:
                - Path=/portal/**
              filters:
                - StripPrefix=1

            - id: survey
              uri: ${CORE_URI:http://localhost:8080}
              predicates:
                - Path=/survey/**
              filters:
                - StripPrefix=1

            - id: advisor
              uri: ${CORE_URI:http://localhost:8080}
              predicates:
                - Path=/advisor/**
              filters:
                - StripPrefix=1

            - id: market
              uri: ${CORE_URI:http://localhost:8080}
              predicates:
                - Path=/market/**
              filters:
                - StripPrefix=1

server:
  port: 9000

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health, info
