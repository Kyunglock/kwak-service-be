spring:
  profiles:
    active: local
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://192.168.0.8:5173"
                  - "http://kyungroak.iptime.org"
                  - "https://kyungroak.iptime.org"
                  - "https://kwaklabs.com"
                  - "https://www.kwaklabs.com"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
            - RemoveRequestHeader=Origin
          routes:
            - id: portal
              uri: ${PORTAL_URI:http://localhost:8080}
              predicates:
                - Path=/portal/**
              filters:
                - StripPrefix=1

            - id: survey
              uri: ${SURVEY_URI:http://localhost:8081}
              predicates:
                - Path=/survey/**
              filters:
                - StripPrefix=1

            - id: advisor
              uri: ${ADVISOR_URI:http://localhost:8082}
              predicates:
                - Path=/advisor/**
              filters:
                - StripPrefix=1

            - id: market
              uri: ${MARKET_URI:http://localhost:8083}
              predicates:
                - Path=/market/**
              filters:
                - StripPrefix=1

server:
  port: 9000

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health, info
