spring:
  profiles:
    active: local
  application:
    name: survey-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

system:
  api-key: ${SYSTEM_API_KEY}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.investment.survey.domain.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8081
  error:
    whitelabel:
      enabled: false
    include-message: always
    include-exception: false
    include-stacktrace: never
  servlet:
    session:
      cookie:
        secure: false # HTTP 허용
        same-site: lax # None이면 Secure 필수

app:
  frontend:
    url: ${APP_FRONT_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
    operations-sorter: alpha
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
