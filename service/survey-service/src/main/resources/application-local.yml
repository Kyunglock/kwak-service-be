spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/invdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  frontend:
    url: ${APP_FRONT_URL:http://localhost:5173}

springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    "[com.investment.survey]": DEBUG
