spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  # Spring AI OpenAI 자동설정은 키가 없으면 부팅 시 빈 생성에 실패한다.
  # market-analyzer는 현재 AI 모델을 직접 호출하지 않으므로, 키가 주입되지 않아도
  # 기동되도록 더미 기본값을 둔다. 실제 키는 OPENAI_API_KEY 환경변수로 주입한다.
  ai:
    openai:
      base-url: ${KWAKAI_BASE_URL}
      api-key: ${OPENAI_API_KEY:dummy}

springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    "[com.investment.analyzer]": INFO
