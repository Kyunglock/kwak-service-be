spring:
  profiles:
    active: local
  application:
    name: portal

  mvc:
    async:
      request-timeout: -1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: insight-builder
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  ai:
    openai:
      # market-analyzer(라이브러리화됨)의 spring-ai-starter-model-openai 자동설정이
      # 부팅 시 OpenAI ChatModel 빈을 생성하려면 api-key가 필요함. market은 ChatClient를
      # 직접 사용하지 않으므로 더미값으로 부팅 실패만 방지. 실제 키는 OPENAI_API_KEY로 주입.
      api-key: ${OPENAI_API_KEY:dummy}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 액세스 토큰 유효시간: 1시간
  refresh-expiration: 604800000 # 리프레시 토큰 유효시간: 7일

system:
  # survey-service의 SystemSurveyController(뉴스 크롤러 연동)가 사용하는 내부 시스템 API 키
  api-key: ${SYSTEM_API_KEY}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.investment
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  error:
    whitelabel:
      enabled: false
    include-message: always
    include-exception: false
    include-stacktrace: never
  servlet:
    session:
      cookie:
        secure: false # HTTP 허용
        same-site: lax # None이면 Secure 필수

app:
  cookie:
    # JWT 쿠키 Secure 플래그. 로컬(HTTP)은 false, HTTPS 배포 시 env로 true 오버라이드
    secure: ${AUTH_COOKIE_SECURE:false}
  admin:
    # 관리자 userId 목록(콤마 구분). 활동 로그 전체 조회 권한. env ADMIN_USER_IDS 로 오버라이드
    user-ids: ${ADMIN_USER_IDS:}

stock:
  api:
    finnhub:
      base-url: https://finnhub.io/api/v1
      api-key: ${FINNHUB_API_KEY:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
    operations-sorter: alpha
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health, info
